services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: devknowledge
      POSTGRES_USER: devknowledge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devknowledge"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      UPLOAD_DIR: /app/uploads
    ports:
      - "3205:3205"
    volumes:
      - ./backend/src:/app/src
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3205
      API_URL: http://api:3205
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
  uploads:
