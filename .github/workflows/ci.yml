name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-backend:
    name: Tests Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm run test
        working-directory: backend

  test-frontend:
    name: Tests Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run test
        working-directory: frontend

  check-backend:
    name: Lint & Typecheck Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm run check:ci
        working-directory: backend
      - run: npm run typecheck
        working-directory: backend

  check-frontend:
    name: Lint & Typecheck Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run check:ci
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend

  deploy-api:
    name: Deploy API to Railway
    needs: [test-backend, test-frontend, check-backend, check-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Check RAILWAY_TOKEN
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not configured. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
      - run: npm install -g @railway/cli
      - run: railway up --service argos-api

  deploy-frontend:
    name: Deploy Frontend to Railway
    needs: [test-backend, test-frontend, check-backend, check-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Check RAILWAY_TOKEN
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not configured. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
      - run: npm install -g @railway/cli
      - run: railway up --service argos-frontend
